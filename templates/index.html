<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DiagramIQ — P&ID Symbol Extractor</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #0f0f1a; color: #e0e0e0; min-height: 100vh; }
        
        header { background: #1a1a2e; padding: 20px 40px; border-bottom: 2px solid #4f46e5; display: flex; align-items: center; gap: 12px; }
        header h1 { font-size: 24px; color: #fff; }
        header span { background: #4f46e5; color: white; font-size: 11px; padding: 3px 10px; border-radius: 20px; }
        
        .container { max-width: 1100px; margin: 40px auto; padding: 0 20px; }
        
        .upload-box { background: #1a1a2e; border: 2px dashed #4f46e5; border-radius: 12px; padding: 50px; text-align: center; cursor: pointer; transition: all 0.2s; }
        .upload-box:hover { background: #1e1e35; border-color: #7c3aed; }
        .upload-box h2 { font-size: 20px; margin-bottom: 8px; color: #fff; }
        .upload-box p { color: #888; font-size: 14px; margin-bottom: 20px; }
        
        input[type="file"] { display: none; }
        
        .btn { background: #4f46e5; color: white; border: none; padding: 12px 28px; border-radius: 8px; font-size: 14px; cursor: pointer; transition: background 0.2s; }
        .btn:hover { background: #4338ca; }
        .btn:disabled { background: #333; cursor: not-allowed; }
        
        .status-bar { margin: 24px 0; padding: 16px 20px; background: #1a1a2e; border-radius: 8px; display: none; align-items: center; gap: 12px; }
        .status-bar.show { display: flex; }
        .spinner { width: 20px; height: 20px; border: 3px solid #333; border-top-color: #4f46e5; border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .status-text { font-size: 14px; color: #aaa; }
        .status-text span { color: #4f46e5; font-weight: bold; }
        
        .summary { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin: 24px 0; }
        .summary-card { background: #1a1a2e; border-radius: 8px; padding: 16px; text-align: center; border: 1px solid #2a2a4a; }
        .summary-card .num { font-size: 28px; font-weight: bold; color: #4f46e5; }
        .summary-card .label { font-size: 11px; color: #888; margin-top: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
        
        .section-title { font-size: 16px; font-weight: bold; color: #fff; margin: 28px 0 12px; padding-bottom: 8px; border-bottom: 1px solid #2a2a4a; }
        
        .symbols-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 16px; }
        
        .symbol-card { background: #1a1a2e; border-radius: 10px; overflow: hidden; border: 1px solid #2a2a4a; transition: transform 0.2s, border-color 0.2s; }
        .symbol-card:hover { transform: translateY(-3px); border-color: #4f46e5; }
        .symbol-card img { width: 100%; height: 140px; object-fit: contain; background: #fff; padding: 8px; }
        .symbol-card .no-img { width: 100%; height: 140px; background: #111; display: flex; align-items: center; justify-content: center; color: #444; font-size: 12px; }
        .symbol-card .card-body { padding: 12px; }
        .symbol-card .shape-label { font-size: 11px; color: #888; margin-bottom: 4px; }
        .symbol-card .tag { font-size: 14px; font-weight: bold; color: #fff; margin-bottom: 6px; font-family: monospace; }
        
        .badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 10px; font-weight: bold; text-transform: uppercase; letter-spacing: 0.5px; }
        .badge.control_valve { background: #1e3a5f; color: #60a5fa; }
        .badge.pressure_vessel { background: #1a3a1a; color: #4ade80; }
        .badge.heat_exchanger { background: #3a1a1a; color: #f87171; }
        .badge.pump { background: #3a2a1a; color: #fb923c; }
        .badge.instrument { background: #2a1a3a; color: #c084fc; }
        .badge.unknown { background: #2a2a2a; color: #888; }
        
        .edit-section { margin-top: 10px; }
        .edit-section input { width: 100%; background: #0f0f1a; border: 1px solid #2a2a4a; color: #e0e0e0; padding: 6px 10px; border-radius: 6px; font-size: 12px; margin-bottom: 6px; }
        .edit-section input:focus { outline: none; border-color: #4f46e5; }
        .save-btn { width: 100%; background: #1e3a5f; color: #60a5fa; border: none; padding: 6px; border-radius: 6px; font-size: 11px; cursor: pointer; }
        .save-btn:hover { background: #1e4a7f; }
        
        .unclassified-title { color: #888; }
        
        .empty { text-align: center; padding: 60px; color: #444; }
    </style>
</head>
<body>

<header>
    <h1>DiagramIQ</h1>
    <span>P&ID Symbol Extractor</span>
</header>

<div class="container">
    <div class="upload-box" onclick="document.getElementById('fileInput').click()">
        <h2>Upload P&ID Diagram</h2>
        <p>Click to select a PDF file containing engineering symbols</p>
        <input type="file" id="fileInput" accept=".pdf" onchange="handleUpload(this)">
        <button class="btn" onclick="event.stopPropagation();" 
            id="uploadBtn" 
            onclick="document.getElementById('fileInput').click()">
            Choose PDF File
        </button>
    </div>

    <div class="status-bar" id="statusBar">
        <div class="spinner" id="spinner"></div>
        <div class="status-text" id="statusText">Uploading...</div>
    </div>

    <div id="results"></div>
</div>

<script>
    let currentJobId = null;
    let pollInterval = null;

    async function handleUpload(input) {
        const file = input.files[0];
        if (!file) return;

        const formData = new FormData();
        formData.append('file', file);

        showStatus('Uploading ' + file.name + '...');

        try {
            const res = await fetch('/api/upload', {
                method: 'POST',
                body: formData
            });
            const data = await res.json();
            currentJobId = data.job_id;
            showStatus('Processing... Job ID: ' + currentJobId);
            startPolling();
        } catch (e) {
            showStatus('Upload failed: ' + e.message);
        }
    }

    function startPolling() {
        pollInterval = setInterval(async () => {
            try {
                const res = await fetch('/api/status/' + currentJobId);
                const data = await res.json();
                
                if (data.status === 'completed') {
                    clearInterval(pollInterval);
                    showStatus('Completed! Found ' + data.total_symbols + ' symbols.');
                    document.getElementById('spinner').style.display = 'none';
                    loadResults();
                } else {
                    showStatus('Processing symbols... (' + (data.total_symbols || 0) + ' found so far)');
                }
            } catch (e) {
                console.error(e);
            }
        }, 3000);
    }

    async function loadResults() {
        const res = await fetch('/api/export/' + currentJobId);
        const data = await res.json();
        renderResults(data);
    }

    function renderResults(data) {
        const summary = data.summary || {};
        const engineering = data.engineering_symbols || [];
        const unclassified = data.unclassified || [];

        let html = '<div class="summary">';
        html += card(data.total_detected, 'Total Detected');
        html += card(data.engineering_symbols_count, 'Engineering');
        html += card(summary.control_valve || 0, 'Control Valves');
        html += card(summary.pressure_vessel || 0, 'Vessels');
        html += card(summary.heat_exchanger || 0, 'Heat Exchangers');
        html += card(summary.pump || 0, 'Pumps');
        html += card(summary.instrument || 0, 'Instruments');
        html += card(data.unclassified_count, 'Unclassified');
        html += '</div>';

        if (engineering.length > 0) {
            html += '<div class="section-title">Engineering Symbols</div>';
            html += '<div class="symbols-grid">';
            engineering.forEach(s => html += symbolCard(s));
            html += '</div>';
        }

        if (unclassified.length > 0) {
            html += '<div class="section-title unclassified-title">Unclassified / Noise</div>';
            html += '<div class="symbols-grid">';
            unclassified.forEach(s => html += symbolCard(s));
            html += '</div>';
        }

        document.getElementById('results').innerHTML = html;
    }

    function card(num, label) {
        return '<div class="summary-card"><div class="num">' + num + '</div><div class="label">' + label + '</div></div>';
    }

    function symbolCard(s) {
        const imgUrl = '/api/symbols/' + s.id + '/image';
        const badgeClass = s.symbol_type || 'unknown';
        const tag = s.tag || 'No tag';
        
        return '<div class="symbol-card">' +
            '<img src="' + imgUrl + '" alt="' + s.shape_label + '" onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'flex\'">' +
            '<div class="no-img" style="display:none">No image</div>' +
            '<div class="card-body">' +
            '<div class="shape-label">' + s.shape_label + '</div>' +
            '<div class="tag">' + tag + '</div>' +
            '<span class="badge ' + badgeClass + '">' + badgeClass.replace('_', ' ') + '</span>' +
            '<div class="edit-section">' +
            '<input type="text" placeholder="Add note or property..." id="prop_' + s.id + '">' +
            '<button class="save-btn" onclick="saveProperty(' + s.id + ')">Save Property</button>' +
            '</div>' +
            '</div>' +
            '</div>';
    }

    async function saveProperty(symbolId) {
        const input = document.getElementById('prop_' + symbolId);
        const value = input.value.trim();
        if (!value) return;

        await fetch('/api/symbols/' + symbolId, {
            method: 'PATCH',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ note: value })
        });

        input.value = '';
        input.placeholder = 'Saved!';
        setTimeout(() => input.placeholder = 'Add note or property...', 2000);
    }

    function showStatus(msg) {
        const bar = document.getElementById('statusBar');
        bar.classList.add('show');
        document.getElementById('statusText').innerHTML = msg;
    }
</script>

</body>
</html>
